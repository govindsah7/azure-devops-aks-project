name: End-to-End DevOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: devopsacr
  IMAGE_NAME: python-calculator
  RESOURCE_GROUP: rg-devops
  AKS_CLUSTER: aks-devops

jobs:

####################################################
# CI
####################################################

  ci:

    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      run: az acr login --name $ACR_NAME

    - name: Build Docker Image
      run: |
        docker build \
        -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .

    - name: Run Docker Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        exit-code: "0"

    - name: Push Docker Image
      run: |
        docker push \
        $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

    - name: Export Image
      id: image
      run: |
        echo "image=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}" >> $GITHUB_OUTPUT

####################################################
# CD
####################################################

  cd:

    needs: ci

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group $RESOURCE_GROUP \
          --name $AKS_CLUSTER \
          --overwrite-existing

    - name: Update Deployment Image
      run: |
        sed -i \
        "s|IMAGE_PLACEHOLDER|${{ needs.ci.outputs.image }}|g" \
        k8s/deployment.yaml

    - name: Deploy ConfigMap
      run: kubectl apply -f k8s/configmap.yaml

    - name: Deploy Secret
      run: kubectl apply -f k8s/secret.yaml

    - name: Deploy Deployment
      run: kubectl apply -f k8s/deployment.yaml

    - name: Wait for Rollout
      run: |
        kubectl rollout status deployment/python-calculator --timeout=300s

    - name: Deploy Service
      run: kubectl apply -f k8s/service.yaml

    - name: Deploy Istio Gateway
      run: kubectl apply -f k8s/gateway.yaml

    - name: Deploy VirtualService
      run: kubectl apply -f k8s/virtualservice.yaml

    - name: Verify Deployment
      run: |
        kubectl get deployment
        kubectl get pods -o wide
        kubectl get svc
        kubectl get gateway
        kubectl get virtualservice

    - name: Smoke Test
      run: |
        echo "Deployment completed successfully."